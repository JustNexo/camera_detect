<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRPass | Авторизация</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="min-h-screen bg-slate-900 flex items-center justify-center relative overflow-hidden">
    <!-- Фоновые декорации -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-indigo-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>

    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-10 border border-slate-100 z-10 relative">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-50 text-blue-600 mb-4">
                <i class="fa-solid fa-shield-halved text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-slate-800">QRPass</h1>
            <p class="text-slate-500 text-sm mt-2 font-medium uppercase tracking-wide">Enterprise Security</p>
        </div>
        
        {% if error %}
            <div class="mb-6 bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm flex items-center">
                <i class="fa-solid fa-circle-exclamation mr-2"></i> {{ error }}
            </div>
        {% endif %}
        
        <form method="post" action="{{ app_url('/login') }}" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Учетная запись</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-user text-slate-400"></i>
                    </div>
                    <input name="username" placeholder="Логин администратора" required class="w-full pl-10 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white transition-colors outline-none text-slate-800">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Пароль</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-slate-400"></i>
                    </div>
                    <input type="password" name="password" placeholder="••••••••" required class="w-full pl-10 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white transition-colors outline-none text-slate-800">
                </div>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-xl py-3 font-semibold shadow-md hover:shadow-lg transition-all duration-200 mt-2">
                Войти в систему
            </button>
        </form>
        
        <div class="mt-8 text-center text-xs text-slate-400">
            &copy; 2026 QRPass Security Systems
        </div>
    </div>
</body>
</html>
